<!DOCTYPE html>
<html>
<head>
    <style>
        #parent {
            position: relative;
            width: 800px;
            height: 600px;  /* 宽高比 4:3 */
            background-color: #1a1a2e;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            overflow: visible;
        }
        
        #child {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #00d4ff, #0066cc);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
            cursor: pointer;
            will-change: transform;
        }
        
        /* 添加尾迹效果（可选） */
        .trail {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div id="child"></div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // 使用第一种方法开始动画
        animateEllipse();
    </script>
</body>
</html>
