<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GSAP 翻卡片效果</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        /* 1. 外层容器：设置透视距离，产生 3D 纵深感 */
        .card-container {
            width: 300px;
            height: 400px;
            perspective: 1000px; 
            cursor: pointer;
        }

        /* 2. 内层包裹器：负责执行旋转动画，保留 3D 空间 */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* 3. 正反两面公共样式：绝对定位重叠，隐藏背面 */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 关键：当元素背对屏幕时隐藏 */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 正面样式 */
        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 2;
        }

        /* 背面样式：预先旋转 180 度，使其初始状态为“背面朝后” */
        .card-back {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

    <!-- DOM 结构 -->
    <div class="card-container" id="cardContainer">
        <div class="card-inner" id="cardInner">
            <div class="card-front">正面内容</div>
            <div class="card-back">背面内容</div>
        </div>
    </div>

    <!-- 引入 GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const cardContainer = document.getElementById('cardContainer');
        const cardInner = document.getElementById('cardInner');
        
        let isFlipped = false;

        // 绑定点击事件
        cardContainer.addEventListener('click', () => {
            isFlipped = !isFlipped;
            
            // 使用 GSAP 实现丝滑的翻转动画
            gsap.to(cardInner, {
                rotationY: isFlipped ? 180 : 0, // 如果是翻转状态则转180度，否则回到0度
                duration: 0.8,                  // 动画持续时间
                ease: "power2.inOut"            // 缓动函数，让开始和结束更自然
            });
        });
    </script>
</body>
</html>
